services:
  experiment:
    build: .
    image: causal-continual-learning:latest
    runtime: nvidia
    environment:
      - WANDB_API_KEY=${WANDB_API_KEY}
      - PYTHONPATH=/workspace/symbioAI:/workspace/mammoth
    volumes:
      # Persist experiment outputs across container restarts
      - ./runs:/workspace/symbioAI/runs
      - ./configs:/workspace/symbioAI/configs
      - ./validation:/workspace/symbioAI/validation
    # Example: run 5-epoch TRUE causality experiment
    command: >
      python run_optimized_true_causality.py
        --use_causal_sampling 3
        --seed 1
        --n_epochs 5
        --buffer_size 500
        --wandb
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
